[package]
name = "rdpweb"
version = "0.1.0"
edition = "2024"

[dependencies]
axum = { version = "0.8", features = ["ws"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "net", "io-util", "sync"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rust-embed = "8"
new_mime_guess = "4"
clap = { version = "4", features = ["derive", "env"] }
anyhow = "1"
thiserror = "2"
log = "0.4"
env_logger = "0.11"
base64 = "0.22"

# Phase 1: uncomment to bring in the server-side RDP engine (see docs/phase1-mvp.md).
# The skeleton compiles without these; src/rdp.rs is a placeholder until then.
# ironrdp = "0.17"
# ironrdp-async = "0.10"
# ironrdp-tls = "0.2"
# tokio-rustls = "0.26"
