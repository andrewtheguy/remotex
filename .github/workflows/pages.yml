name: Pages

# Publishes the install script to GitHub Pages, so
#   curl -fsSL https://andrewtheguy.github.io/remotex/install.sh | bash
# always serves the copy on `main`. Only install.sh is published — install
# instructions live in the repo (docs/install.md), not on Pages. Enable Pages
# once (Settings → Pages → Source: GitHub Actions) for this to deploy.

on:
  push:
    branches: [main]
    paths:
      - install.sh
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Never cancel an in-flight deploy; let the latest finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Assemble site (install.sh only)
        run: |
          mkdir -p _site
          cp install.sh _site/install.sh

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
