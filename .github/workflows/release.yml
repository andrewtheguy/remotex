name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine and validate version
        id: version
        run: |
          # Real TOML parse + semver check, not grep/sed (see also packaging/build-tarball.sh).
          # Plain python3 (3.11+ for tomllib): uv is for local dev, not the CI runners.
          VERSION=$(python3 -c '
          import re, sys, tomllib
          with open("Cargo.toml", "rb") as f:
              version = tomllib.load(f)["package"]["version"]
          if not re.fullmatch(r"\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?(?:\+[0-9A-Za-z.-]+)?", version):
              sys.exit(f"invalid version in Cargo.toml: {version!r}")
          print(version)
          ')
          TAG="v${VERSION}"
          echo "Release tag: ${TAG}"
          IS_PRERELEASE="false"
          [ "$GITHUB_REF_NAME" = "main" ] || IS_PRERELEASE="true"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=${IS_PRERELEASE}" >> "$GITHUB_OUTPUT"

      - name: Abort if tag already exists
        run: |
          if git ls-remote --tags origin "refs/tags/${{ steps.version.outputs.tag }}" | grep -q .; then
            echo "::error::Tag ${{ steps.version.outputs.tag }} already exists on remote. Bump the version in Cargo.toml first."
            exit 1
          fi

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          # Clean up any leftover draft from a previous failed run with the same
          # version. A draft release doesn't create the git tag on the remote, so
          # a stale draft is the only thing that can collide here (real published
          # tags are caught by the step above).
          if gh release view "${{ steps.version.outputs.tag }}" --json isDraft --jq '.isDraft' 2>/dev/null | grep -qx true; then
            echo "Deleting stale draft release ${{ steps.version.outputs.tag }}"
            gh release delete "${{ steps.version.outputs.tag }}" --yes
          fi
          gh release create "${{ steps.version.outputs.tag }}" \
            --draft \
            --target "${{ github.sha }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes \
            ${{ steps.version.outputs.is_prerelease == 'true' && '--prerelease' || '' }}

  # The frontend bundle is platform-agnostic — build it once here and reuse it
  # for every target tarball, rather than rebuilding on each matrix runner.
  frontend:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Build frontend
        run: cd frontend && bun install --frozen-lockfile && bun run build

      - name: Upload frontend bundle
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          if-no-files-found: error

  build:
    needs: [prepare, frontend]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target-note: linux-x86_64
          - runner: ubuntu-24.04-arm
            target-note: linux-arm64
          - runner: macos-latest
            target-note: macos-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Download prebuilt frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build release tarball (${{ matrix.target-note }})
        run: SKIP_FRONTEND_BUILD=1 bash packaging/build-tarball.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rdpweb-${{ matrix.target-note }}
          path: dist/*.tar.gz
          if-no-files-found: error

  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Upload artifacts to draft release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release upload "${{ needs.prepare.outputs.tag }}" artifacts/*.tar.gz --clobber

      - name: Publish release (remove draft, creates the tag)
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release edit "${{ needs.prepare.outputs.tag }}" --draft=false
