name: Release

on:
  workflow_dispatch:

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine and validate version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          VERSION=$(grep -m1 '^version = ' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          [ -n "$VERSION" ] || { echo "no version in Cargo.toml" >&2; exit 1; }
          TAG="v${VERSION}"
          echo "Release tag: ${TAG}"
          if gh api "repos/${GH_REPO}/git/ref/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists. Bump the version in Cargo.toml first." >&2
            exit 1
          fi
          IS_PRERELEASE="false"
          [ "$GITHUB_REF_NAME" = "main" ] || IS_PRERELEASE="true"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=${IS_PRERELEASE}" >> "$GITHUB_OUTPUT"

  # The frontend bundle is platform-agnostic — build it once here and reuse it
  # for every target tarball, rather than rebuilding on each matrix runner.
  frontend:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Build frontend
        run: cd frontend && bun install --frozen-lockfile && bun run build

      - name: Upload frontend bundle
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          if-no-files-found: error

  build:
    needs: [prepare, frontend]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target-note: linux-x86_64
          - runner: ubuntu-24.04-arm
            target-note: linux-arm64
          - runner: macos-latest
            target-note: macos-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Download prebuilt frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build release tarball (${{ matrix.target-note }})
        run: SKIP_FRONTEND_BUILD=1 bash packaging/build-tarball.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rdpweb-${{ matrix.target-note }}
          path: dist/*.tar.gz
          if-no-files-found: error

  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.tag }}
          files: artifacts/*.tar.gz
          prerelease: ${{ needs.prepare.outputs.is_prerelease == 'true' }}
          generate_release_notes: true
